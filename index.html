<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Stikbot 10: Protector of Earth - 3DS Web Edition</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        body { background-color: #030712; color: #fff; font-family: sans-serif; text-align: center; padding: 5px; }
        
        #game-container { position: relative; width: 100%; max-width: 800px; margin: 0 auto; border: 3px solid #22c55e; background: #000; }
        canvas { display: block; width: 100%; height: auto; }

        .top-bar { display: flex; justify-content: space-between; align-items: center; max-width: 800px; margin: 0 auto 5px auto; flex-wrap: wrap; gap: 4px; }
        
        .dlc-btn {
            background: #1e293b; color: #fff; border: 1px solid #334155; padding: 6px 8px;
            font-size: 0.75rem; font-weight: bold; border-radius: 4px; cursor: pointer; text-transform: uppercase;
        }
        .dlc-btn:active { background: #22c55e; color: #000; }

        /* 3DS-FRIENDLY OVERLAY SCREEN */
        .overlay-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #030712; z-index: 999; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 10px;
        }

        .menu-title { font-size: 1.8rem; color: #22c55e; font-weight: bold; margin-bottom: 2px; }
        .menu-subtitle { font-size: 0.8rem; color: #94a3b8; margin-bottom: 12px; }
        
        .menu-btn {
            display: block; width: 220px; padding: 10px; margin: 4px 0; background: #1e293b;
            color: #fff; border: 2px solid #22c55e; font-size: 0.95rem; font-weight: bold;
            border-radius: 6px; cursor: pointer; text-transform: uppercase;
        }
        .menu-btn:active { background: #22c55e; color: #000; }

        /* CONTROLS */
        .controls-container { max-width: 800px; margin: 5px auto 0 auto; }
        .alien-selector { display: flex; overflow-x: auto; gap: 4px; padding: 6px; background: #0f172a; border-radius: 6px; }
        .alien-btn { background: #1e293b; color: #fff; border: 1px solid #334155; padding: 6px 10px; font-size: 0.75rem; font-weight: bold; white-space: nowrap; cursor: pointer; }
        .alien-btn.unlocked { border-color: #22c55e; }
        .alien-btn.locked { opacity: 0.4; }

        .touch-pad { display: flex; justify-content: space-between; align-items: center; padding: 8px; }
        .d-pad { display: grid; grid-template-columns: repeat(3, 40px); grid-template-rows: repeat(3, 40px); gap: 4px; }
        .action-btns { display: flex; gap: 8px; }
        .btn { background: #334155; border: 1px solid #64748b; color: white; border-radius: 50%; font-weight: bold; font-size: 1rem; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; }
        .btn:active { background: #22c55e; }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="dlc-btn" id="btnShop">STORE 🛒</button>
        <button class="dlc-btn" id="btnExit">EXIT 🚪</button>
        <button class="dlc-btn" id="btnMenu">MENU 🏠</button>
        <button class="dlc-btn" id="btnLevels">LEVELS 🗺️</button>
        <button class="dlc-btn" id="btnCheats">CODES 🔑</button>
    </div>
    
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="400"></canvas>

        <!-- MAIN MENU OVERLAY -->
        <div id="mainMenuModal" class="overlay-screen">
            <div class="menu-title">STIKBOT 10</div>
            <div class="menu-subtitle">PROTECTOR OF EARTH</div>

            <button class="menu-btn" id="btnStartGame">STORY CAMPAIGN</button>
            <button class="menu-btn" style="border-color:#38bdf8;" id="btnOpenStore">DLC STORE 🛒</button>
            <button class="menu-btn" style="border-color:#a855f7;" id="btnOpenLevels">LEVEL SELECT</button>
            <button class="menu-btn" style="border-color:#facc15;" id="btnOpenCheats">OMNIVERSE CHEATS</button>
        </div>

        <!-- SIMPLE MODALS -->
        <div id="simpleModal" class="overlay-screen" style="display:none;">
            <div class="menu-title" id="modalTitle">TITLE</div>
            <div class="menu-subtitle" id="modalText">Message goes here...</div>
            <button class="menu-btn" id="btnCloseModal">BACK TO MENU</button>
        </div>
    </div>

    <div class="controls-container">
        <div class="alien-selector" id="alienBar"></div>

        <div class="touch-pad">
            <div class="d-pad">
                <div></div><button class="btn" id="btnUp">▲</button><div></div>
                <button class="btn" id="btnLeft">◄</button><div></div><button class="btn" id="btnRight">►</button>
                <div></div><button class="btn" id="btnDown">▼</button><div></div>
            </div>
            <div class="action-btns">
                <button class="btn" id="btnAttack">Z</button>
                <button class="btn" id="btnSpecial">X</button>
            </div>
        </div>
    </div>

<script>
// Canvas & State Setup
var canvas = document.getElementById('gameCanvas');
var ctx = canvas.getContext('2d');

var isFightActive = false;
var cameraX = 0;

var player = {
    x: 80, y: 200, vx: 0, vy: 0, isGrounded: false,
    name: 'FOUR ARMS', color: '#ef4444', height: 50, speed: 4, damage: 25,
    health: 100, isAttacking: false
};

var platforms = [
    { x: 0, y: 320, w: 400, h: 80 },
    { x: 450, y: 260, w: 220, h: 20 },
    { x: 720, y: 320, w: 600, h: 80 }
];

var enemies = [
    { x: 500, y: 200, vy: 0, health: 40, speed: 1, name: 'DRONE' },
    { x: 900, y: 200, vy: 0, health: 200, speed: 1, name: 'BOSS VILGAX' }
];

// Helper Function to bind 3DS-friendly Tap Events
function bindTap(id, callback) {
    var el = document.getElementById(id);
    if (!el) return;
    el.onclick = function(e) {
        if (e) e.preventDefault();
        callback();
    };
    el.ontouchstart = function(e) {
        if (e) e.preventDefault();
        callback();
    };
}

// Menu Bindings
bindTap('btnStartGame', function() {
    document.getElementById('mainMenuModal').style.display = 'none';
    isFightActive = true;
});

bindTap('btnOpenStore', function() { showModal("DLC STORE", "Store coming soon! Use cheat codes to unlock everything."); });
bindTap('btnOpenLevels', function() { showModal("LEVEL SELECT", "Campaign level selection ready."); });
bindTap('btnOpenCheats', function() { showModal("CHEAT CODE ACTIVE", "Master Control Enabled! (01-02-03-04)"); });
bindTap('btnCloseModal', function() {
    document.getElementById('simpleModal').style.display = 'none';
    document.getElementById('mainMenuModal').style.display = 'flex';
});

bindTap('btnMenu', function() {
    isFightActive = false;
    document.getElementById('simpleModal').style.display = 'none';
    document.getElementById('mainMenuModal').style.display = 'flex';
});

function showModal(title, text) {
    document.getElementById('mainMenuModal').style.display = 'none';
    document.getElementById('modalTitle').innerText = title;
    document.getElementById('modalText').innerText = text;
    document.getElementById('simpleModal').style.display = 'flex';
}

// Touch Controls
var keys = {};
function bindTouchKey(id, keyName) {
    var el = document.getElementById(id);
    if (!el) return;
    el.ontouchstart = function(e) { e.preventDefault(); keys[keyName] = true; };
    el.ontouchend = function(e) { e.preventDefault(); keys[keyName] = false; };
    el.onmousedown = function() { keys[keyName] = true; };
    el.onmouseup = function() { keys[keyName] = false; };
}

bindTouchKey('btnLeft', 'left');
bindTouchKey('btnRight', 'right');
bindTouchKey('btnUp', 'up');
bindTouchKey('btnAttack', 'z');

window.onkeydown = function(e) { keys[e.key.toLowerCase()] = true; };
window.onkeyup = function(e) { keys[e.key.toLowerCase()] = false; };

function update() {
    if (!isFightActive) return;

    player.vx = 0;
    if (keys['left'] || keys['arrowleft']) player.vx = -player.speed;
    if (keys['right'] || keys['arrowright']) player.vx = player.speed;

    if ((keys['up'] || keys['arrowup']) && player.isGrounded) {
        player.vy = -11;
        player.isGrounded = false;
    }

    player.vy += 0.6; // Gravity
    player.x += player.vx;
    player.y += player.vy;

    // Platform Collision
    player.isGrounded = false;
    for (var i = 0; i < platforms.length; i++) {
        var plat = platforms[i];
        if (player.x + 15 > plat.x && player.x - 15 < plat.x + plat.w) {
            if (player.y >= plat.y && player.y - player.vy <= plat.y) {
                player.y = plat.y;
                player.vy = 0;
                player.isGrounded = true;
            }
        }
    }

    cameraX = Math.max(0, player.x - 200);

    if (player.y > 450) {
        player.x = 80;
        player.y = 200;
        player.vy = 0;
    }
}

function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Sky
    ctx.fillStyle = '#38bdf8';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Platforms
    ctx.fillStyle = '#78350f';
    for (var i = 0; i < platforms.length; i++) {
        var plat = platforms[i];
        ctx.fillRect(plat.x - cameraX, plat.y, plat.w, plat.h);
    }

    // Player
    ctx.fillStyle = player.color;
    ctx.fillRect(player.x - cameraX - 10, player.y - player.height, 20, player.height);

    // Enemies
    ctx.fillStyle = '#15803d';
    for (var j = 0; j < enemies.length; j++) {
        var en = enemies[j];
        ctx.fillRect(en.x - cameraX - 12, en.y - 40, 24, 40);
    }
}

function gameLoop() {
    update();
    render();
    setTimeout(gameLoop, 1000 / 30); // 30 FPS Lock for 3DS
}

gameLoop();
</script>
</body>
</html>
